<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <filter id="noise" x="0" y="0" width="100%" height="100%" filterRes="32 32">
    <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="1" seed="7" stitchTiles="stitch" />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.23" />
      <feFuncG type="linear" slope="0.23" />
      <feFuncB type="linear" slope="0.23" />
      <feFuncA type="table" tableValues="0 0.15" />
    </feComponentTransfer>
  </filter>
  <rect width="128" height="128" filter="url(#noise)" />
</svg>
